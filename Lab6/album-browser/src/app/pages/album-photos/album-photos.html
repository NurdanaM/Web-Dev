<h2>Album Photos</h2>

@if (photos$ | async; as photos) {
  @if (errorMessage) {
    <p class="error">{{ errorMessage }}</p>
  }

  @if (photos.length === 0) {
    <p class="muted">No photos found.</p>
  } @else {
    <div class="grid">
      @for (p of photos; track p.id) {
        <figure class="tile">
          <img class="thumb" [src]="p.thumbnailUrl" [alt]="p.title" />
          <figcaption class="caption">{{ p.title }}</figcaption>
        </figure>
      }
    </div>
  }

  <a class="btn" [routerLink]="['/albums', albumId]">Back</a>
} @else {
  <p class="muted">Loading photos...</p>
}
